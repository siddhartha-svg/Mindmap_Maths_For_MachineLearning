<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>Graph Theory for Machine Learning — Mind Map</title>
<style>
  :root{
    --bg-top:#eaf1f8;
    --bg-bot:#c9dced;
    --ink:#1c2b3a;
    --node-border:#2f5f8f;
    --node-fill:#ffffff;
    --node-text:#16283c;
    --formula-bg:#fbf3df;
    --formula-border:#c9a86a;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
    font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    overflow:hidden;
    height:100%;
    width:100%;
  }
  #viewport{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    touch-action:pan-x pan-y pinch-zoom;
  }
  #scaler{
    position:absolute;
    top:0;left:0;
    transform-origin:top left;
  }
  .header{
    text-align:center;
    padding:22px 10px 8px;
  }
  .header h1{
    margin:0;
    font-size:30px;
    letter-spacing:.5px;
    font-weight:700;
    color:#12263d;
  }
  .header p{
    margin:6px 0 0;
    font-size:13px;
    color:#4a6480;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  #stage{
    position:relative;
    width:2700px;
    height:2600px;
    margin:0 auto;
  }
  svg.connectors{
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }
  .ring{
    position:absolute;
    border-radius:50%;
    border:1px dashed rgba(70,100,130,0.22);
    top:50%;left:50%;
    transform:translate(-50%,-50%);
  }
  .center{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:160px;height:160px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #4d7fb5, #16324f 75%);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    font-weight:800;
    font-size:20px;
    box-shadow:0 8px 24px rgba(20,40,60,0.35);
    border:4px solid #fff;
    z-index:5;
    text-align:center;
    line-height:1.15;
  }
  .center span{font-size:11px;font-weight:500;opacity:.85;letter-spacing:1px;}

  .node{
    position:absolute;
    transform:translate(-50%,-50%);
    background:var(--node-fill);
    border:2px solid var(--node-border);
    border-radius:10px;
    padding:7px 13px;
    font-size:13px;
    font-weight:600;
    color:var(--node-text);
    white-space:nowrap;
    box-shadow:0 3px 8px rgba(20,40,70,0.12);
    z-index:4;
  }
  .node.branch{
    font-size:14px;
    padding:9px 15px;
    border-width:2.5px;
    z-index:6;
    color:#fff;
  }
  .node.leaf{
    font-weight:500;
    font-size:12px;
    padding:6px 11px;
    box-shadow:0 2px 5px rgba(20,40,70,0.10);
  }
  .node.app{
    background:#12263d;
    color:#fff;
    border-color:#12263d;
    font-weight:600;
    font-size:11.5px;
  }
  .formula-box{
    position:absolute;
    transform:translate(-50%,-50%);
    background:var(--formula-bg);
    border:1.5px solid var(--formula-border);
    border-radius:8px;
    padding:7px 12px;
    font-size:12px;
    font-style:italic;
    color:#5a4522;
    white-space:nowrap;
    box-shadow:0 3px 8px rgba(90,70,30,0.15);
    z-index:6;
  }
  .legend{
    position:absolute;
    top:24px;
    right:24px;
    background:#12263d;
    color:#fff;
    padding:14px 18px;
    border-radius:10px;
    font-size:11.5px;
    line-height:1.85;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
    z-index:10;
    width:230px;
  }
  .legend b{display:block;font-size:13px;margin-bottom:6px;letter-spacing:.5px;}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle;}
</style>
</head>
<body>

<div id="viewport">
  <div id="scaler">
    <div class="header">
      <h1>Graph Theory for Machine Learning</h1>
      <p>Classical Graph Algorithms to Graph Neural Networks &amp; Graph AI</p>
    </div>

    <div id="stage">
      <div class="ring" style="width:850px;height:850px;"></div>
      <div class="ring" style="width:1450px;height:1450px;"></div>
      <div class="ring" style="width:2100px;height:2100px;"></div>
      <div class="ring" style="width:2600px;height:2600px;"></div>

      <svg class="connectors" id="svg"></svg>

      <div class="center">AI/ML<span>GRAPH THEORY</span></div>

      <div class="legend">
        <b>LEGEND</b>
        <span class="swatch" style="background:#3f6fa8"></span>Foundations / Classical<br>
        <span class="swatch" style="background:#7a5fa8"></span>Matrices / Spectral / Embeddings<br>
        <span class="swatch" style="background:#3f8f6f"></span>Network Science<br>
        <span class="swatch" style="background:#b25a4f"></span>Graph Deep Learning<br>
        <span class="swatch" style="background:#0d1b28"></span>Large-Scale Learning<br>
        <span class="swatch" style="background:#fbf3df;border:1.5px solid #c9a86a;display:inline-block"></span>Formula<br>
        <span class="swatch" style="background:#12263d"></span>ML Application
      </div>
    </div>
  </div>
</div>

<div id="zoom-controls" style="position:fixed;bottom:16px;right:16px;z-index:50;display:flex;gap:8px;">
  <button onclick="rescale(1.15)" style="width:40px;height:40px;border-radius:50%;border:none;background:#12263d;color:#fff;font-size:18px;box-shadow:0 4px 10px rgba(0,0,0,0.3);">+</button>
  <button onclick="rescale(0.87)" style="width:40px;height:40px;border-radius:50%;border:none;background:#12263d;color:#fff;font-size:18px;box-shadow:0 4px 10px rgba(0,0,0,0.3);">−</button>
  <button onclick="fitToScreen()" style="height:40px;padding:0 14px;border-radius:20px;border:none;background:#3f6fa8;color:#fff;font-size:12px;box-shadow:0 4px 10px rgba(0,0,0,0.3);">Fit</button>
</div>

<script>
const cx = 1350, cy = 1300;
const stage = document.getElementById('stage');
const svg = document.getElementById('svg');

const COLORS = {
  core:"#3f6fa8",
  spectral:"#7a5fa8",
  network:"#3f8f6f",
  gnn:"#b25a4f",
  scale:"#0d1b28"
};

const branches = [
  { label:"Foundations", color:COLORS.core, r:370,
    kids:["Vertices & Edges","Directed / Undirected","Weighted Graphs","Graph Representation"] },
  { label:"Basic Graph Properties", color:COLORS.core, r:370,
    kids:["Degree","Graph Density","Connectivity","SCC / WCC"] },
  { label:"Graph Traversal", color:COLORS.core, r:360,
    kids:["BFS","DFS","Topological Sorting","Reachability"] },
  { label:"Trees", color:COLORS.core, r:370,
    kids:["Rooted Tree","Binary Tree","Spanning Tree","MST","Decision Tree"] },
  { label:"Paths & Cycles", color:COLORS.core, r:380,
    kids:["Walk / Trail / Path","Hamiltonian Path / Cycle","Euler Path / Circuit","Shortest Path"] },
  { label:"Graph Algorithms", color:COLORS.core, r:390,
    kids:["Dijkstra","Bellman-Ford","Floyd-Warshall","A* Search","Prim / Kruskal","Union-Find"] },
  { label:"Graph Matrices", color:COLORS.spectral, r:380,
    kids:["Adjacency Matrix","Incidence Matrix","Degree Matrix","Laplacian Matrix"] },
  { label:"Spectral Graph Theory", color:COLORS.spectral, r:390,
    kids:["Graph Laplacian","Eigenvalues / Eigenvectors","Spectral Clustering","Graph Fourier Transform"] },
  { label:"Graph Embeddings", color:COLORS.spectral, r:390,
    kids:["Node / Edge Embeddings","DeepWalk","Node2Vec","GraphSAGE Embeddings"] },
  { label:"Random Graphs", color:COLORS.network, r:370,
    kids:["Erdős–Rényi Graph","Small World Networks","Scale-Free Networks","Random Walks"] },
  { label:"Network Analysis", color:COLORS.network, r:390,
    kids:["Degree / Betweenness Centrality","Eigenvector Centrality","PageRank","Community Detection"] },
  { label:"Graph Optimization", color:COLORS.network, r:380,
    kids:["Graph Partitioning","Graph Matching","Max Flow / Min Cut","Bipartite Matching"] },
  { label:"Graph Neural Networks", color:COLORS.gnn, r:400,
    kids:["Message Passing","Graph Convolution","Graph Pooling","Graph Attention","Node / Edge Classification"] },
  { label:"Advanced GNN Architectures", color:COLORS.gnn, r:410,
    kids:["GCN","GAT","GraphSAGE","GIN","Graph Transformer","GAE / VGAE"] },
  { label:"Dynamic & Heterogeneous Graphs", color:COLORS.gnn, r:410,
    kids:["Temporal Graphs","Heterogeneous Graphs","Knowledge Graphs","Hypergraphs"] },
  { label:"Large-Scale Graph Learning", color:COLORS.scale, r:390,
    kids:["Distributed Graph Processing","Graph Sampling","Mini-Batch GNN Training"] },
];

const N = branches.length;
branches.forEach((b,i)=>{ b.angle = (360/N)*i; });

const apps = [
  {label:"GNNs → Message Passing, Graph Laplacian", angle:0, r:1160},
  {label:"Recommendation Systems → Graph Embeddings", angle:22.5, r:1140},
  {label:"Knowledge Graphs → Graph Traversal, Embeddings", angle:45, r:1160},
  {label:"Social Networks → Community Detection, PageRank", angle:67.5, r:1180},
  {label:"Drug Discovery → Molecular Graphs, GNNs", angle:90, r:1140},
  {label:"Fraud Detection → Link Prediction, Graph Classification", angle:112.5, r:1180},
  {label:"Search Engines → PageRank", angle:135, r:1100},
  {label:"Traffic & Routing → Shortest Path, Network Flow", angle:157.5, r:1160},
  {label:"Computer Vision → Scene Graphs, Graph Transformers", angle:180, r:1180},
  {label:"LLMs + Retrieval → Knowledge Graphs", angle:202.5, r:1140},
  {label:"GCN / GAT / GraphSAGE → Advanced Architectures", angle:225, r:1180},
  {label:"Protein Structure Prediction → GNNs", angle:247.5, r:1140},
  {label:"Node Classification → Message Passing", angle:270, r:1140},
  {label:"Reinforcement Learning on Graphs → Graph Optimization", angle:292.5, r:1200},
  {label:"Link Prediction → Graph Embeddings", angle:315, r:1140},
  {label:"NLP → Knowledge Graphs, Scene Graphs", angle:337.5, r:1140},
];

const formulas = [
  {label:"L = D − A  (Graph Laplacian)", angle:45, r:700},
  {label:"PR(v) = Σ PR(u)/L(u)", angle:135, r:700},
  {label:"H' = σ(D⁻½AD⁻½HW)  (GCN)", angle:225, r:700},
  {label:"αᵢⱼ = softmax(aᵀ[Whᵢ‖Whⱼ])  (GAT)", angle:225, r:800},
  {label:"d(u,v) = shortest path length", angle:157.5, r:700},
];

function pt(angleDeg, r){
  const a = angleDeg * Math.PI/180;
  return { x: cx + r*Math.cos(a), y: cy + r*Math.sin(a) };
}

function makeNode(cls, text, x, y){
  const d = document.createElement('div');
  d.className = cls;
  d.style.left = x+'px';
  d.style.top = y+'px';
  d.innerText = text;
  stage.appendChild(d);
  return d;
}

function line(x1,y1,x2,y2,color,width){
  const ln = document.createElementNS("http://www.w3.org/2000/svg","line");
  ln.setAttribute("x1",x1); ln.setAttribute("y1",y1);
  ln.setAttribute("x2",x2); ln.setAttribute("y2",y2);
  ln.setAttribute("stroke",color);
  ln.setAttribute("stroke-width",width);
  ln.setAttribute("opacity","0.55");
  svg.appendChild(ln);
}

const center = {x:cx, y:cy};

branches.forEach(b=>{
  const bp = pt(b.angle, b.r);
  line(center.x, center.y, bp.x, bp.y, b.color, 2.5);
  const bn = makeNode('node branch', b.label, bp.x, bp.y);
  bn.style.background = b.color;
  bn.style.borderColor = b.color;

  const n = b.kids.length;
  const step = Math.min(9, 42/n);
  b.kids.forEach((label,i)=>{
    const off = (i - (n-1)/2) * step;
    const rr = b.r + 260 + (i%3)*55;
    const kp = pt(b.angle + off, rr);
    line(bp.x, bp.y, kp.x, kp.y, b.color, 1.3);
    makeNode('node leaf', label, kp.x, kp.y);
  });
});

formulas.forEach(f=>{
  const p = pt(f.angle, f.r);
  line(cx, cy, p.x, p.y, "#c9a86a", 1);
  const d = document.createElement('div');
  d.className = 'formula-box';
  d.style.left = p.x+'px'; d.style.top = p.y+'px';
  d.innerText = f.label;
  stage.appendChild(d);
});

apps.forEach(a=>{
  const p = pt(a.angle, a.r);
  line(center.x, center.y, p.x, p.y, "#12263d", 0.8);
  makeNode('node leaf app', a.label, p.x, p.y);
});

// ---- Fit-to-screen scaling + drag to pan ----
const viewport = document.getElementById('viewport');
const scaler = document.getElementById('scaler');
let currentScale = 1;
let panX = 0, panY = 0;

function applyTransform(){
  scaler.style.transform = `translate(${panX}px, ${panY}px) scale(${currentScale})`;
}

function fitToScreen(){
  const stageW = stage.offsetWidth + 400;
  const stageH = stage.offsetHeight + 240;
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const scaleX = vw / stageW;
  const scaleY = vh / stageH;
  currentScale = Math.min(scaleX, scaleY) * 0.98;
  panX = (vw - stageW*currentScale)/2;
  panY = 10;
  applyTransform();
}

function rescale(factor){
  currentScale *= factor;
  applyTransform();
}

window.addEventListener('load', fitToScreen);
window.addEventListener('resize', fitToScreen);

let isDown=false, startX=0, startY=0, startPanX=0, startPanY=0;
viewport.addEventListener('pointerdown',(e)=>{
  isDown=true; startX=e.clientX; startY=e.clientY; startPanX=panX; startPanY=panY;
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener('pointermove',(e)=>{
  if(!isDown) return;
  panX = startPanX + (e.clientX-startX);
  panY = startPanY + (e.clientY-startY);
  applyTransform();
});
viewport.addEventListener('pointerup',()=>{isDown=false;});
viewport.addEventListener('pointercancel',()=>{isDown=false;});
</script>

</body>
</html>
